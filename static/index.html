from fastapi import FastAPI
from fastapi.responses import HTMLResponse

app = FastAPI()


@app.get("/")
def home():

    return HTMLResponse("""
<!DOCTYPE html>

<html lang="zh-TW">

<body>

<h1>
🎵 JianpuTool MIDI → 簡譜
</h1>


<form action="/midi"
method="post"
enctype="multipart/form-data">


<input type="file"
name="file"
accept=".mid">


<br><br>


<button>
產生簡譜 PDF
</button>


</form>


</body>

</html>
""")


@app.get("/status")
def status():

    return {
        "status": "JianpuTool MVP OK"
    }
